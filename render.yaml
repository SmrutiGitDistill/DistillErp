services:
  - type: web
    name: distillerp-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: >-
      cd backend &&
      python render_start.py &&
      gunicorn main:app
      --workers 1
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:$PORT
      --timeout 120
      --log-level info
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromDatabase:
          name: distillerp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173
      - key: BACKUP_PATH
        value: /tmp/distillerp-backups
      - key: INITIAL_SUPERADMIN_EMAIL
        sync: false
      - key: INITIAL_SUPERADMIN_PASSWORD
        sync: false
      - key: INITIAL_SUPERADMIN_NAME
        value: Super Admin

databases:
  - name: distillerp-db
    plan: free
    databaseName: distillerp
    user: distillerp
